services:

  # ── Application (only with: docker compose --profile start_application up -d --build) ──
  oauth2-authorization-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oauth2-authorization-server
    profiles:
      - start_application
    ports:
      - "9000:9000"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/oauth2_authorization_server
      DB_USERNAME: mb_test
      DB_PASSWORD: 'test'
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_LDAP_URL: ldap://lldap:3890
      MINIO_ENDPOINT: http://minio:9000
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      OTEL_EXPORTER_OTLP_METRICS_URL: http://grafana-lgtm:4318/v1/metrics
      OTEL_EXPORTER_OTLP_TRACES_URL: http://grafana-lgtm:4318/v1/traces
      OTEL_EXPORTER_OTLP_LOGS_URL: http://grafana-lgtm:4318/v1/logs
    depends_on:
      - mariadb
      - redis
      - lldap
    restart: unless-stopped
    networks:
      - oauth2-network

  # ── Infrastructure services (always started with: docker compose up -d) ──────
  mariadb:
    image: mariadb:12.1.2
    container_name: mariadb
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: oauth2_authorization_server
      MYSQL_USER: mb_test
      MYSQL_PASSWORD: 'test'
    volumes:
      - data:/var/lib/mysql
    ports:
      - "3306:3306"
    restart: unless-stopped
    networks:
      - oauth2-network

  redis:
    image: redis:8.4.0
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - oauth2-network

  redis-insight:
    image: redis/redisinsight:latest
    restart: always
    container_name: redis-insight
    ports:
      - "5540:5540"
    volumes:
      - redis-insight:/data
    networks:
      - oauth2-network

  ollama:
    image: ollama/ollama:0.13.3
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    tty: true
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    volumes:
      - open-webui:/app/backend/data
    depends_on:
      - ollama
    ports:
      - "3000:8080"
    environment:
      - 'OLLAMA_BASE_URL=http://ollama:11434'
      - 'WEBUI_SECRET_KEY='
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped

  lldap:
    image: lldap/lldap:2025-12-12
    container_name: lldap
    environment:
      LLDAP_JWT_SECRET: "superSecretJwtTokenForTestingPurposesOnly123" # The JWT secret should be at least 32 characters long
      LLDAP_LDAP_USER_DN: "admin"
      LLDAP_LDAP_USER_PASS: "admin_pass"
      LLDAP_LDAP_BASE_DN: "dc=mbexample,dc=com"
      LLDAP_HTTP_PORT: "17170"
      LLDAP_LDAP_PORT: "3890"
    ports:
      - "10389:3890"
      - "17170:17170"
    volumes:
      - ldap-data:/data
    restart: unless-stopped
    networks:
      - oauth2-network

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio
    environment:
      MINIO_ROOT_USER: "minio-admin"
      MINIO_ROOT_PASSWORD: "minio-password"
    volumes:
      - minio:/data
    ports:
      - "9091:9000"
      - "9001:9001"
    command: server /data --console-address :9001
    networks:
      - oauth2-network

  zipkin:
    image: openzipkin/zipkin:3
    container_name: zipkin
    ports:
      - "9411:9411"
    networks:
      - oauth2-network

  grafana-lgtm:
    image: 'grafana/otel-lgtm:0.13.0'
    ports:
      - "3001:3000"   # Grafana UI
      - "4318:4318"   # OTLP HTTP receiver
      - "4317:4317"   # OTLP gRPC receiver
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - oauth2-network

volumes:
  ollama: { }
  open-webui: { }
  data:
  redis-data:
  redis-insight:
  ldap-data:
  minio:

networks:
  oauth2-network:
    driver: bridge