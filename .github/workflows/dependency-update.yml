# Automatically check for Maven dependency updates and create a PR if any are found.
# Runs every 5 minutes, on every pull request, and can also be triggered manually.

name: Dependency Version Update

on:
  workflow_dispatch: # Allow manual trigger
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '*/5 * * * *' # Every 5 minutes

jobs:
  update-versions:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Check for parent POM updates
        id: parent-check
        run: |
          echo "--- Checking parent POM (spring-boot-starter-parent) ---"
          mvn -B versions:display-parent-updates --file pom.xml 2>&1 | tee /tmp/parent-updates.txt
          if grep -q "newer version" /tmp/parent-updates.txt; then
            echo "parent_update_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "parent_update_available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for property updates
        id: prop-check
        run: |
          echo "--- Checking property version updates ---"
          mvn -B versions:display-property-updates --file pom.xml 2>&1 | tee /tmp/property-updates.txt
          if grep -q "\->" /tmp/property-updates.txt; then
            echo "property_update_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "property_update_available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for dependency updates
        id: dep-check
        run: |
          echo "--- Checking dependency version updates ---"
          mvn -B versions:display-dependency-updates --file pom.xml 2>&1 | tee /tmp/dependency-updates.txt
          if grep -q "\->" /tmp/dependency-updates.txt; then
            echo "dependency_update_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "dependency_update_available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply parent POM update
        if: steps.parent-check.outputs.parent_update_available == 'true'
        run: |
          echo "--- Updating parent POM ---"
          mvn -B versions:update-parent -DgenerateBackupPoms=false --file pom.xml

      - name: Apply property version updates
        if: steps.prop-check.outputs.property_update_available == 'true'
        run: |
          echo "--- Updating property versions ---"
          mvn -B versions:update-properties -DgenerateBackupPoms=false --file pom.xml

      - name: Apply dependency version updates
        if: steps.dep-check.outputs.dependency_update_available == 'true'
        run: |
          echo "--- Updating dependencies to latest releases ---"
          mvn -B versions:use-latest-releases -DgenerateBackupPoms=false --file pom.xml

      - name: Check if pom.xml changed
        id: diff-check
        run: |
          if git diff --quiet pom.xml; then
            echo "All dependencies are up to date. No changes needed."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "pom.xml has been updated."
            echo "has_changes=true" >> "$GITHUB_OUTPUT"

            # Build the PR body with the diff summary
            {
              echo 'pr_body<<EOF'
              echo '## 🔄 Dependency Version Updates'
              echo ''
              echo 'This PR was automatically created by the **Dependency Version Update** workflow.'
              echo ''
              echo '### Changes'
              echo '```diff'
              git diff pom.xml
              echo '```'
              echo ''
              echo '### Checklist'
              echo '- [ ] Review the version changes above'
              echo '- [ ] Verify CI build passes'
              echo '- [ ] Check for breaking changes in release notes'
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Verify build compiles with updated versions
        if: steps.diff-check.outputs.has_changes == 'true'
        run: |
          echo "--- Verifying the project compiles with updated versions ---"
          mvn -B compile --file pom.xml

      - name: Create Pull Request
        if: steps.diff-check.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "build(deps): update Maven dependency versions"
          branch: automated/dependency-updates
          delete-branch: true
          title: "build(deps): update Maven dependency versions"
          body: ${{ steps.diff-check.outputs.pr_body }}
          labels: |
            dependencies
            automated
          reviewers: ${{ github.repository_owner }}
